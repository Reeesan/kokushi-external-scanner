<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>國士舞双 練習管理ツール</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
    :root {
      --bg:#F7FBFC;
      --surface:#FFFFFF;
      --line:#D9E7EC;
      --text-main:#17324D;
      --text-sub:#5C7285;
      --primary:#4CB9E7;
      --secondary:#7BC7BE;
      --accent-soft:#8ED8FF;
      --alert-soft:#FF8F7A;
      --radius:14px;
    }
    * { box-sizing: border-box; }
    html { width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      background:
        radial-gradient(980px 420px at 100% 0%, rgba(142,216,255,.25), transparent 62%),
        radial-gradient(960px 380px at 0% 0%, rgba(123,199,190,.18), transparent 58%),
        var(--bg);
      color: var(--text-main);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }
    .wrap {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 24px) 16px calc(env(safe-area-inset-bottom, 0px) + 32px);
    }
    .header {
      margin-bottom: 16px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 16px;
      padding: 16px;
    }
    .header-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
    .header-code {
      display:inline-flex; align-items:center; height:28px; padding:0 12px;
      border:1px solid rgba(76,185,231,.35); border-radius:999px;
      background:rgba(142,216,255,.2); color:var(--text-sub); font-size:12px; letter-spacing:.08em;
    }
    .header-copy { margin:0; color:var(--text-sub); font-size:12px; font-weight:500; }
    .title {
      margin:0;
      font-family:'Barlow Condensed', sans-serif;
      font-size:44px;
      line-height:1;
      letter-spacing:.02em;
      font-weight:700;
    }
    .sub { margin-top:6px; color:var(--text-sub); font-size:13px; line-height:1.45; }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab-btn {
      min-height:44px; border:1px solid var(--line); background:var(--surface); color:var(--text-main);
      border-radius:10px; font-size:14px; font-weight:700; cursor:pointer;
    }
    .tab-btn.active { background:linear-gradient(135deg,var(--primary),var(--accent-soft)); color:#fff; border-color:var(--primary); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .card {
      background:var(--surface); color:var(--text-main); border:1px solid var(--line);
      border-radius:var(--radius); padding:16px; margin-bottom:12px;
    }
    .card-title { margin:0 0 10px; font-size:15px; letter-spacing:.06em; color:var(--text-sub); font-weight:700; text-transform:uppercase; }
    .label { display:block; margin:0 0 6px; font-size:12px; color:var(--text-sub); font-weight:500; letter-spacing:.04em; }
    .input, .select {
      width:100%; height:48px; padding:0 12px; border:1px solid var(--line);
      border-radius:10px; font-size:15px; background:#fff; color:var(--text-main);
    }
    .input:focus, .select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 2px rgba(76,185,231,.18); }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .stack { display:grid; gap:10px; }
    .modes { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .mode-btn, .btn {
      min-height:48px; border-radius:10px; border:1px solid var(--line);
      font-size:15px; font-weight:700; cursor:pointer;
    }
    .mode-btn { background:#fff; color:var(--text-main); }
    .mode-btn.active-in { background:rgba(142,216,255,.24); border-color:rgba(76,185,231,.45); }
    .mode-btn.active-out { background:rgba(123,199,190,.22); border-color:rgba(123,199,190,.5); }
    .btn { background:#fff; color:var(--text-main); white-space: normal; }
    .btn-main { background:linear-gradient(135deg,var(--primary),var(--accent-soft)); color:#fff; border-color:var(--primary); }
    .btn-soft { background:#f9fdff; }
    .primary-action { min-height: 58px; font-size: 16px; }
    .btn:disabled { opacity:.65; cursor:not-allowed; }
    .camera-box {
      position: relative;
      width: 100%;
      min-height: min(320px, 42svh);
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
      background:#f4fbff;
    }
    video { width: 100%; height: min(360px, 44svh); object-fit: cover; display: none; background: #000; }
    .placeholder {
      min-height: min(320px, 42svh);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-sub);
      font-size: 14px;
      line-height: 1.6;
      padding: 18px;
    }
    .status {
      border-radius:12px; padding:14px; background:#f2faff; font-size:14px; line-height:1.6; border:1px solid var(--line);
      overflow-wrap:anywhere;
    }
    .status.success-in { background:rgba(142,216,255,.2); border-color:rgba(76,185,231,.45); }
    .status.success-out { background:rgba(123,199,190,.18); border-color:rgba(123,199,190,.5); }
    .status.error { background:rgba(255,143,122,.14); border-color:rgba(255,143,122,.45); }
    .status-title { font-weight:700; font-size:15px; margin-bottom:4px; }
    .kv { display: grid; gap: 8px; }
    .kv-row { display: grid; grid-template-columns: 120px 1fr; gap: 10px; align-items: center; }
    .kv-key { color: var(--text-sub); font-size: 13px; font-weight: 700; }
    .kv-val { color: var(--text-main); font-size: 14px; overflow-wrap: anywhere; }
    .muted { color: var(--text-sub); font-size:13px; line-height:1.6; }
    .admin-panel { display:grid; gap:0; }
    .mini-title { margin:0 0 6px; color:var(--text-sub); font-size:12px; font-weight:700; letter-spacing:.04em; }
    .log-list { display:grid; gap:8px; }
    .log-item {
      display:grid; gap:8px; padding:12px; border:1px solid var(--line); border-radius:10px;
      background:#f9fdff;
    }
    .log-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .log-name { font-weight:700; font-size:14px; }
    .log-meta { color:var(--text-sub); font-size:12px; line-height:1.5; overflow-wrap:anywhere; }
    .badge {
      display:inline-flex; align-items:center; min-height:24px; padding:0 8px; border-radius:999px;
      background:rgba(123,199,190,.18); color:var(--text-main); font-size:12px; font-weight:700;
      white-space:nowrap;
    }
    .badge-invalid { background:rgba(255,143,122,.16); color:#8a3a2b; }
    .btn-small { min-height:36px; font-size:13px; }
    .debug-only { display: none; }
    body.debug .debug-only { display: grid; }
    [hidden] { display:none !important; }

    @media (min-width: 640px) {
      .row-scan { grid-template-columns: 2fr 1fr; }
    }

    @media (max-width: 560px) {
      .row, .modes, .tabs, .row-scan { grid-template-columns:1fr; }
      .title { font-size:34px; }
      video { height: min(300px, 44svh); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="header-top">
        <span class="header-code">PRACTICE SCANNER</span>
        <p class="header-copy">ID #P-240427</p>
      </div>
      <h1 class="title">國士舞双 練習管理ツール</h1>
      <div class="sub">外部スキャナ専用。連続読取で素早く打刻。</div>
    </div>

    <div class="tabs">
      <button id="tabBtn-punch" class="tab-btn active" type="button" onclick="switchTab('punch')">打刻</button>
      <button id="tabBtn-admin" class="tab-btn" type="button" onclick="switchTab('admin')">管理</button>
      <button id="tabBtn-data" class="tab-btn" type="button" onclick="switchTab('data')">データ</button>
    </div>

    <div id="tab-punch" class="tab-panel active">
      <div class="card stack">
      <div class="card-title">操作設定</div>
      <div>
        <label class="label">対象セッション</label>
        <select id="sessionSelect" class="select" onchange="renderDataPanel()"></select>
      </div>
      <div>
        <label class="label">担当者名</label>
        <input id="operatorName" class="input" placeholder="例: sekida">
      </div>
      <div>
        <label class="label">打刻モード</label>
        <div class="modes">
          <button id="modeIn" class="mode-btn active-in" type="button" onclick="setMode('in')">入場</button>
          <button id="modeOut" class="mode-btn" type="button" onclick="setMode('out')">退場</button>
        </div>
      </div>
    </div>

    <div class="card stack">
      <div class="card-title">QR読み取り</div>
      <div class="row">
        <button class="btn btn-main primary-action" type="button" onclick="startContinuousScan()">連続読取開始</button>
        <button class="btn btn-soft" type="button" onclick="stopCamera()">カメラ停止</button>
      </div>
      <div class="camera-box">
        <video id="cameraVideo" playsinline autoplay muted></video>
        <canvas id="cameraCanvas" style="display:none;"></canvas>
        <div id="cameraPlaceholder" class="placeholder">カメラ未起動です。<br>「連続読取開始」を押してください。</div>
      </div>
      <div class="row row-scan">
        <input id="scanValue" class="input" placeholder="読み取り結果 / 手入力">
        <button class="btn btn-soft" type="button" onclick="submitScanByInput()">手入力送信</button>
      </div>
    </div>
    </div>

    <div id="tab-admin" class="tab-panel">
      <div id="adminLocked" class="card stack">
        <div class="card-title">管理PIN</div>
        <input id="adminPinInput" class="input" type="password" inputmode="numeric" autocomplete="off" placeholder="管理PIN">
        <button class="btn btn-main primary-action" type="button" onclick="unlockAdmin()">管理機能を開く</button>
      </div>

      <div id="adminUnlocked" class="admin-panel" hidden>
        <div class="card stack">
          <div class="card-title">管理操作</div>
          <div>
            <label class="label">管理対象セッション</label>
            <select id="adminSessionSelect" class="select"></select>
          </div>
          <div class="row">
            <button class="btn btn-soft" type="button" onclick="loadSessions()">練習一覧を更新</button>
            <button class="btn btn-soft" type="button" onclick="loadAdminData()">管理データを更新</button>
          </div>
          <div class="row">
            <button class="btn btn-main" type="button" onclick="recalculateSelectedSession()">再計算</button>
            <button class="btn btn-soft" type="button" onclick="closeSelectedSession()">練習を終了</button>
          </div>
          <button class="btn btn-soft" type="button" onclick="lockAdmin()">管理を閉じる</button>
        </div>

        <div class="card stack">
          <div class="card-title">打刻忘れ追加</div>
          <div>
            <label class="label">対象セッション</label>
            <select id="manualSessionSelect" class="select"></select>
          </div>
          <div>
            <label class="label">メンバー</label>
            <select id="manualMemberSelect" class="select"></select>
          </div>
          <div>
            <label class="label">打刻種別</label>
            <div class="modes">
              <button id="manualModeIn" class="mode-btn active-in" type="button" onclick="setManualMode('in')">入場</button>
              <button id="manualModeOut" class="mode-btn" type="button" onclick="setManualMode('out')">退場</button>
            </div>
          </div>
          <div>
            <label class="label">打刻日時</label>
            <input id="manualScannedAt" class="input" type="datetime-local">
          </div>
          <div>
            <label class="label">メモ</label>
            <input id="manualNote" class="input" placeholder="例: 打刻忘れ">
          </div>
          <button class="btn btn-main primary-action" type="button" onclick="submitManualPunch()">打刻を追加</button>
        </div>

        <div class="card stack">
          <div class="card-title">打刻履歴の無効化</div>
          <div>
            <label class="label">対象セッション</label>
            <select id="logSessionSelect" class="select"></select>
          </div>
          <div>
            <label class="label">メンバー</label>
            <select id="logMemberSelect" class="select"></select>
          </div>
          <button class="btn btn-soft" type="button" onclick="loadPunchLogs()">履歴を読み込む</button>
          <div id="punchLogList" class="log-list">
            <div class="muted">履歴を読み込むとここに表示されます。</div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-data" class="tab-panel">
      <div class="card stack">
        <div class="card-title">データ参照</div>
        <div class="kv">
          <div class="kv-row"><div class="kv-key">対象セッション</div><div id="dataSession" class="kv-val">-</div></div>
          <div class="kv-row"><div class="kv-key">打刻モード</div><div id="dataMode" class="kv-val">-</div></div>
          <div class="kv-row"><div class="kv-key">端末ID</div><div id="dataDevice" class="kv-val">-</div></div>
          <div class="kv-row debug-only"><div class="kv-key">接続先</div><div id="dataApi" class="kv-val">-</div></div>
          <div class="kv-row debug-only"><div class="kv-key">診断URL</div><div id="dataDebugUrl" class="kv-val">-</div></div>
        </div>
      </div>
    </div>

    <div id="status" class="status">
      <div class="status-title">準備中</div>
      <div>セッションを読み込みます。</div>
    </div>
  </div>

  <script>
    const LS_DEVICE = 'kokushi_scanner_device_id_v1';
    const SS_ADMIN_PIN = 'kokushi_scanner_admin_pin_v1';
    const DEFAULT_API_BASE = 'https://script.google.com/macros/s/AKfycbwkSQ3HC3utCATzjxNHNAhoLRg33ghMUDVy0zkoZmXGHiXyvn8ALMfvqEPU_47evI1TDw/exec';
    const DEBUG_MODE = new URLSearchParams(location.search).get('debug') === '1';
    let currentMode = 'in';
    let manualEventType = 'in';
    let adminPin = sessionStorage.getItem(SS_ADMIN_PIN) || '';
    let adminSessions = [];
    let memberCache = [];
    let punchLogCache = [];
    let stream = null;
    let scanRAF = 0;
    let barcodeDetector = null;
    let inflight = false;
    let lastScanned = '';
    let lastScannedAt = 0;
    let lastTryAt = 0;
    let currentTab = 'punch';
    const deviceId = getOrCreateDeviceId_();

    init();

    function init() {
      document.body.classList.toggle('debug', DEBUG_MODE);
      const base = getApiBase_();
      setStatus(base ? '準備完了。セッションを自動読込します。' : 'スキャナ設定が未完了です。管理者に確認してください。', !base);
      renderDataPanel();
      renderAdminPanel();
      if (base) loadSessions();
    }

    function switchTab(name) {
      currentTab = name;
      ['punch', 'admin', 'data'].forEach((n) => {
        document.getElementById(`tab-${n}`).classList.toggle('active', n === name);
        document.getElementById(`tabBtn-${n}`).classList.toggle('active', n === name);
      });
      if (name === 'data') renderDataPanel();
      if (name === 'admin') {
        renderAdminPanel();
        if (adminPin && (!adminSessions.length || !memberCache.length)) loadAdminData();
      }
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('modeIn').className = 'mode-btn' + (mode === 'in' ? ' active-in' : '');
      document.getElementById('modeOut').className = 'mode-btn' + (mode === 'out' ? ' active-out' : '');
      renderDataPanel();
    }

    function setManualMode(mode) {
      manualEventType = mode;
      document.getElementById('manualModeIn').className = 'mode-btn' + (mode === 'in' ? ' active-in' : '');
      document.getElementById('manualModeOut').className = 'mode-btn' + (mode === 'out' ? ' active-out' : '');
    }

    async function loadSessions() {
      try {
        const res = await apiCall_('sessions', {});
        if (!res.ok) throw new Error(res.error || 'sessions 取得失敗');
        const sessions = Array.isArray(res.data) ? res.data : [];
        const select = document.getElementById('sessionSelect');
        select.innerHTML = '';
        if (!sessions.length) {
          const opt = document.createElement('option');
          opt.value = '';
          opt.textContent = '利用可能な練習がありません';
          select.appendChild(opt);
          setStatus('セッションがありません。', true);
          return;
        }
        sessions.forEach((s) => {
          const opt = document.createElement('option');
          opt.value = s.session_id || '';
          opt.textContent = s.label || s.session_id;
          select.appendChild(opt);
        });
        setStatus('セッションを読み込みました。', false);
        renderDataPanel();
      } catch (err) {
        setStatus(`セッション取得失敗: ${err.message || err}`, true);
      }
    }

    async function unlockAdmin() {
      const pin = document.getElementById('adminPinInput').value.trim();
      if (!pin) return setStatus('管理PINを入力してください。', true);
      try {
        const res = await apiCall_('verify_pin', { pin });
        if (!res.ok) throw new Error(res.error || 'PIN確認に失敗しました。');
        if (!res.data || !res.data.verified) throw new Error('PINが違います。');
        adminPin = pin;
        sessionStorage.setItem(SS_ADMIN_PIN, pin);
        document.getElementById('adminPinInput').value = '';
        renderAdminPanel();
        await loadAdminData();
        setStatus('管理機能を開きました。', false);
      } catch (err) {
        setStatus(`管理PIN確認失敗: ${err.message || err}`, true);
      }
    }

    function lockAdmin() {
      adminPin = '';
      adminSessions = [];
      memberCache = [];
      punchLogCache = [];
      sessionStorage.removeItem(SS_ADMIN_PIN);
      renderAdminPanel();
      renderPunchLogs_();
      setStatus('管理機能を閉じました。', false);
    }

    function renderAdminPanel() {
      const locked = document.getElementById('adminLocked');
      const unlocked = document.getElementById('adminUnlocked');
      if (!locked || !unlocked) return;
      locked.hidden = !!adminPin;
      unlocked.hidden = !adminPin;
      if (adminPin) {
        setManualMode(manualEventType);
        setDefaultManualDateTime_();
        renderAdminOptions_();
      }
    }

    async function loadAdminData() {
      if (!adminPin) return setStatus('管理PINを入力してください。', true);
      try {
        const [sessionsRes, membersRes] = await Promise.all([
          apiCall_('admin_sessions', { pin: adminPin }),
          apiCall_('members', { pin: adminPin }),
        ]);
        if (!sessionsRes.ok) throw new Error(sessionsRes.error || '練習一覧の取得に失敗しました。');
        if (!membersRes.ok) throw new Error(membersRes.error || 'メンバー一覧の取得に失敗しました。');
        adminSessions = Array.isArray(sessionsRes.data) ? sessionsRes.data : [];
        memberCache = Array.isArray(membersRes.data) ? membersRes.data : [];
        renderAdminOptions_();
        setStatus('管理データを読み込みました。', false);
      } catch (err) {
        setStatus(`管理データ取得失敗: ${err.message || err}`, true);
      }
    }

    async function submitManualPunch() {
      if (!adminPin) return setStatus('管理PINを入力してください。', true);
      const sessionId = valueOf_('manualSessionSelect');
      const memberId = valueOf_('manualMemberSelect');
      const scannedAt = valueOf_('manualScannedAt');
      if (!sessionId) return setStatus('対象セッションを選択してください。', true);
      if (!memberId) return setStatus('メンバーを選択してください。', true);
      if (!scannedAt) return setStatus('打刻日時を入力してください。', true);

      try {
        const res = await apiCall_('manual_punch', {
          pin: adminPin,
          sessionId,
          memberId,
          eventType: manualEventType,
          scannedAt,
          operatorName: document.getElementById('operatorName').value.trim(),
          note: valueOf_('manualNote'),
        });
        if (!res.ok) throw new Error(res.error || '打刻追加に失敗しました。');
        const data = res.data || {};
        setStatus(data.message || '打刻を追加しました。', false, data.event_type || manualEventType);
        document.getElementById('manualNote').value = '';
        if (valueOf_('logSessionSelect') === sessionId) loadPunchLogs();
      } catch (err) {
        setStatus(`打刻追加失敗: ${err.message || err}`, true);
      }
    }

    async function loadPunchLogs() {
      if (!adminPin) return setStatus('管理PINを入力してください。', true);
      const sessionId = valueOf_('logSessionSelect');
      if (!sessionId) return setStatus('対象セッションを選択してください。', true);
      try {
        const res = await apiCall_('punch_logs', {
          pin: adminPin,
          sessionId,
          memberId: valueOf_('logMemberSelect'),
        });
        if (!res.ok) throw new Error(res.error || '履歴取得に失敗しました。');
        punchLogCache = Array.isArray(res.data) ? res.data : [];
        renderPunchLogs_();
        setStatus(`打刻履歴を ${punchLogCache.length} 件読み込みました。`, false);
      } catch (err) {
        setStatus(`履歴取得失敗: ${err.message || err}`, true);
      }
    }

    async function invalidateLog(index) {
      if (!adminPin) return setStatus('管理PINを入力してください。', true);
      const log = punchLogCache[Number(index)];
      if (!log || !log.log_id) return setStatus('対象の打刻ログが見つかりません。', true);
      if (String(log.status) !== 'valid') return setStatus('この打刻はすでに無効です。', true);
      const reason = prompt('無効化理由を入力してください', '誤打刻');
      if (!reason || !reason.trim()) return;

      try {
        const res = await apiCall_('invalidate_punch', {
          pin: adminPin,
          sessionId: log.session_id,
          logId: log.log_id,
          reason: reason.trim(),
          operatorName: document.getElementById('operatorName').value.trim(),
        });
        if (!res.ok) throw new Error(res.error || '無効化に失敗しました。');
        setStatus('打刻を無効化し、集計を更新しました。', false);
        await loadPunchLogs();
      } catch (err) {
        setStatus(`無効化失敗: ${err.message || err}`, true);
      }
    }

    async function recalculateSelectedSession() {
      if (!adminPin) return setStatus('管理PINを入力してください。', true);
      const sessionId = valueOf_('adminSessionSelect');
      if (!sessionId) return setStatus('対象セッションを選択してください。', true);
      try {
        const res = await apiCall_('recalculate', { pin: adminPin, sessionId });
        if (!res.ok) throw new Error(res.error || '再計算に失敗しました。');
        const count = res.data && res.data.count !== undefined ? res.data.count : '-';
        setStatus(`再計算しました。対象 ${count} 件`, false);
      } catch (err) {
        setStatus(`再計算失敗: ${err.message || err}`, true);
      }
    }

    async function closeSelectedSession() {
      if (!adminPin) return setStatus('管理PINを入力してください。', true);
      const sessionId = valueOf_('adminSessionSelect');
      if (!sessionId) return setStatus('対象セッションを選択してください。', true);
      if (!confirm('この練習を終了しますか？')) return;

      try {
        const res = await apiCall_('close_session', { pin: adminPin, sessionId });
        if (!res.ok) throw new Error(res.error || '練習終了に失敗しました。');
        setStatus('練習を終了し、集計を更新しました。', false);
        await loadSessions();
        await loadAdminData();
      } catch (err) {
        setStatus(`練習終了失敗: ${err.message || err}`, true);
      }
    }

    async function startContinuousScan() {
      const base = getApiBase_();
      if (!base) return setStatus('スキャナ設定が未完了です。管理者に確認してください。', true);
      try {
        selectedSession_();
      } catch (err) {
        return setStatus(err.message || String(err), true);
      }
      await startCamera();
    }

    async function startCamera() {
      try {
        if (!window.isSecureContext) throw new Error('HTTPSで開いてください。');
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error('このブラウザはカメラ非対応です。');
        stopCamera();

        stream = await getStream_();
        const video = document.getElementById('cameraVideo');
        video.playsInline = true;
        video.autoplay = true;
        video.muted = true;
        video.setAttribute('webkit-playsinline', 'true');
        video.srcObject = stream;
        await waitReady_(video);
        await playWithRetry_(video);

        const placeholder = document.getElementById('cameraPlaceholder');
        video.style.display = 'block';
        placeholder.style.display = 'none';

        barcodeDetector = await buildDetector_();
        startLoop_();
        setStatus('カメラ起動完了。QRをかざしてください。', false);
      } catch (err) {
        stopCamera();
        setStatus(`カメラ起動失敗: ${err.message || err}`, true);
      }
    }

    function stopCamera() {
      if (scanRAF) cancelAnimationFrame(scanRAF);
      scanRAF = 0;
      barcodeDetector = null;
      lastTryAt = 0;
      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }
      const video = document.getElementById('cameraVideo');
      const placeholder = document.getElementById('cameraPlaceholder');
      video.pause();
      video.srcObject = null;
      video.style.display = 'none';
      placeholder.style.display = 'flex';
    }

    function startLoop_() {
      if (scanRAF) cancelAnimationFrame(scanRAF);
      const tick = async () => {
        try { await scanFrame_(); } catch (_) {}
        if (stream) scanRAF = requestAnimationFrame(tick);
      };
      scanRAF = requestAnimationFrame(tick);
    }

    async function scanFrame_() {
      if (inflight) return;
      const video = document.getElementById('cameraVideo');
      if (!video || video.readyState < 2) return;
      const now = Date.now();
      if ((now - lastTryAt) < 180) return;
      lastTryAt = now;

      let value = '';
      if (barcodeDetector) value = await detectByBarcode_(video);
      if (!value) value = detectByJsqr_(video);
      if (!value) return;
      if (value === lastScanned && (now - lastScannedAt) < 3000) return;

      lastScanned = value;
      lastScannedAt = now;
      document.getElementById('scanValue').value = value;
      await sendScan_(value);
    }

    async function submitScanByInput() {
      const value = document.getElementById('scanValue').value.trim();
      if (!value) return setStatus('QR値を入力してください。', true);
      await sendScan_(value);
    }

    async function sendScan_(scanValue) {
      if (inflight) return;
      inflight = true;
      try {
        const res = await apiCall_('record_scan', {
          sessionId: selectedSession_(),
          scanValue,
          eventType: currentMode,
          deviceId,
          deviceName: navigator.userAgent || 'external-scanner',
          operatorName: document.getElementById('operatorName').value.trim(),
          source: 'external',
        });
        if (!res.ok) throw new Error(res.error || '打刻失敗');
        const data = res.data || {};
        setStatus(`${data.name || 'メンバー'} / ${eventTypeLabel_(data.event_type)} を記録しました。`, false, data.event_type);
      } catch (err) {
        setStatus(`打刻失敗: ${err.message || err}`, true);
      } finally {
        inflight = false;
      }
    }

    async function getStream_() {
      const candidates = [
        { audio: false, video: { facingMode: { exact: 'environment' } } },
        { audio: false, video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
        { audio: false, video: { facingMode: 'environment' } },
        { audio: false, video: { facingMode: { ideal: 'environment' } } },
        { audio: false, video: { width: { ideal: 1280 }, height: { ideal: 720 } } },
        { audio: false, video: true },
      ];
      let lastErr = null;
      for (const constraints of candidates) {
        try {
          return await navigator.mediaDevices.getUserMedia(constraints);
        } catch (err) {
          lastErr = err;
        }
      }
      throw lastErr || new Error('カメラを利用できません。');
    }

    async function buildDetector_() {
      if (!('BarcodeDetector' in window)) return null;
      try {
        const formats = BarcodeDetector.getSupportedFormats ? await BarcodeDetector.getSupportedFormats() : [];
        if (formats.length && !formats.includes('qr_code')) return null;
        return new BarcodeDetector({ formats: ['qr_code'] });
      } catch (_) {
        return null;
      }
    }

    async function detectByBarcode_(video) {
      try {
        const rows = await barcodeDetector.detect(video);
        if (!rows || !rows.length) return '';
        return String(rows[0].rawValue || '').trim();
      } catch (_) {
        return '';
      }
    }

    function detectByJsqr_(video) {
      const canvas = document.getElementById('cameraCanvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const width = video.videoWidth;
      const height = video.videoHeight;
      if (!width || !height) return '';
      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(video, 0, 0, width, height);
      const image = ctx.getImageData(0, 0, width, height);
      const row = jsQR(image.data, width, height, { inversionAttempts: 'dontInvert' });
      return row && row.data ? String(row.data).trim() : '';
    }

    function waitReady_(video, timeoutMs = 2000) {
      return new Promise((resolve) => {
        if (video.readyState >= 2) return resolve();
        let done = false;
        const fin = () => {
          if (done) return;
          done = true;
          video.removeEventListener('loadedmetadata', onReady);
          video.removeEventListener('canplay', onReady);
          resolve();
        };
        const onReady = () => fin();
        video.addEventListener('loadedmetadata', onReady, { once: true });
        video.addEventListener('canplay', onReady, { once: true });
        setTimeout(fin, timeoutMs);
      });
    }

    async function playWithRetry_(video) {
      let err = null;
      for (const delayMs of [0, 120, 280, 560]) {
        if (delayMs) await new Promise((r) => setTimeout(r, delayMs));
        try {
          await video.play();
          return;
        } catch (e) {
          err = e;
        }
      }
      throw err || new Error('カメラ映像を再生できません。');
    }

    function selectedSession_() {
      const v = document.getElementById('sessionSelect').value;
      if (!v) throw new Error('対象セッションを選択してください。');
      return v;
    }

    function setStatus(text, isError, eventType) {
      const el = document.getElementById('status');
      el.className = 'status';
      if (isError) {
        el.classList.add('error');
      } else if (eventType === 'out') {
        el.classList.add('success-out');
      } else {
        el.classList.add('success-in');
      }
      el.innerHTML = `<div class="status-title">${isError ? '確認してください' : '状態'}</div><div>${escapeHtml_(text || '')}</div>`;
    }

    function renderDataPanel() {
      const sessionSel = document.getElementById('sessionSelect');
      const sessionText = sessionSel && sessionSel.selectedOptions && sessionSel.selectedOptions[0]
        ? sessionSel.selectedOptions[0].textContent
        : '-';
      document.getElementById('dataSession').textContent = sessionText || '-';
      document.getElementById('dataMode').textContent = currentMode === 'out' ? '退場' : '入場';
      document.getElementById('dataDevice').textContent = deviceId;
      const apiEl = document.getElementById('dataApi');
      const debugEl = document.getElementById('dataDebugUrl');
      if (apiEl) apiEl.textContent = DEBUG_MODE ? (getApiBase_() || '-') : '-';
      if (debugEl) debugEl.textContent = DEBUG_MODE ? buildDebugUrl_() : '-';
    }

    function renderAdminOptions_() {
      if (!adminPin) return;
      const preferredSessionId = valueOf_('adminSessionSelect') || valueOf_('sessionSelect') || (adminSessions[0] && adminSessions[0].session_id) || '';
      fillSessionSelect_('adminSessionSelect', preferredSessionId);
      fillSessionSelect_('manualSessionSelect', valueOf_('manualSessionSelect') || preferredSessionId);
      fillSessionSelect_('logSessionSelect', valueOf_('logSessionSelect') || preferredSessionId);
      fillMemberSelect_('manualMemberSelect', false, valueOf_('manualMemberSelect'));
      fillMemberSelect_('logMemberSelect', true, valueOf_('logMemberSelect'));
    }

    function fillSessionSelect_(id, selectedId) {
      const select = document.getElementById(id);
      if (!select) return;
      const current = selectedId || select.value || '';
      select.innerHTML = '';
      if (!adminSessions.length) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '練習がありません';
        select.appendChild(opt);
        return;
      }
      adminSessions.forEach((session) => {
        const opt = document.createElement('option');
        opt.value = session.session_id || '';
        opt.textContent = session.label || session.session_id || '';
        select.appendChild(opt);
      });
      if (current && Array.from(select.options).some(opt => opt.value === current)) {
        select.value = current;
      }
    }

    function fillMemberSelect_(id, allowAll, selectedId) {
      const select = document.getElementById(id);
      if (!select) return;
      const current = selectedId || select.value || '';
      select.innerHTML = '';
      if (allowAll) {
        const allOpt = document.createElement('option');
        allOpt.value = '';
        allOpt.textContent = 'すべてのメンバー';
        select.appendChild(allOpt);
      }
      if (!memberCache.length) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = allowAll ? 'メンバー未読込' : 'メンバーがありません';
        select.appendChild(opt);
        return;
      }
      memberCache.forEach((member) => {
        const opt = document.createElement('option');
        opt.value = member.member_id || '';
        opt.textContent = `${member.display_no ? member.display_no + ' ' : ''}${member.name || member.member_id}`;
        select.appendChild(opt);
      });
      if (current && Array.from(select.options).some(opt => opt.value === current)) {
        select.value = current;
      }
    }

    function renderPunchLogs_() {
      const el = document.getElementById('punchLogList');
      if (!el) return;
      if (!punchLogCache.length) {
        el.innerHTML = '<div class="muted">打刻履歴はありません。</div>';
        return;
      }

      el.innerHTML = punchLogCache.map((log, index) => {
        const isValid = String(log.status) === 'valid';
        const eventLabel = eventTypeLabel_(log.event_type);
        const scannedAt = formatDateTime_(log.scanned_at);
        const source = log.source ? ` / ${escapeHtml_(log.source)}` : '';
        const message = log.message ? `<div class="log-meta">${escapeHtml_(log.message)}</div>` : '';
        const action = isValid
          ? `<button class="btn btn-soft btn-small" type="button" onclick="invalidateLog(${index})">無効化</button>`
          : '';
        return `
          <div class="log-item">
            <div class="log-head">
              <div>
                <div class="log-name">${escapeHtml_(log.display_no ? log.display_no + ' ' : '')}${escapeHtml_(log.name || log.member_id || '')}</div>
                <div class="log-meta">${escapeHtml_(scannedAt)} / ${escapeHtml_(eventLabel)}${source}</div>
              </div>
              <span class="badge ${isValid ? '' : 'badge-invalid'}">${isValid ? '有効' : '無効'}</span>
            </div>
            ${message}
            ${action}
          </div>
        `;
      }).join('');
    }

    function setDefaultManualDateTime_() {
      const el = document.getElementById('manualScannedAt');
      if (el && !el.value) el.value = toDateTimeInputValue_(new Date());
    }

    function valueOf_(id) {
      const el = document.getElementById(id);
      return el ? String(el.value || '').trim() : '';
    }

    async function apiCall_(action, params) {
      const base = getApiBase_();
      if (!base) throw new Error('スキャナ設定が未完了です。');
      const payload = Object.assign({}, params || {}, { api: action });
      return jsonp_(base, payload);
    }

    function jsonp_(baseUrl, params) {
      return new Promise((resolve, reject) => {
        const cb = `__jsonp_cb_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        let requestUrl = '';
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('API応答がタイムアウトしました。公開設定または通信状態を確認してください。'));
        }, 12000);

        const cleanup = () => {
          clearTimeout(timeout);
          if (script && script.parentNode) script.parentNode.removeChild(script);
          try { delete window[cb]; } catch (_) { window[cb] = undefined; }
        };

        window[cb] = (result) => {
          cleanup();
          resolve(result || {});
        };

        const url = new URL(baseUrl);
        Object.keys(params || {}).forEach((k) => {
          const val = params[k];
          if (val === undefined || val === null) return;
          url.searchParams.set(k, String(val));
        });
        url.searchParams.set('callback', cb);
        requestUrl = url.toString();

        const script = document.createElement('script');
        script.src = requestUrl;
        script.onerror = () => {
          cleanup();
          reject(new Error('API読込に失敗しました。GASの公開設定を確認してください。'));
        };
        document.body.appendChild(script);
      });
    }

    function getApiBase_() {
      return normalizeBaseUrl_(DEFAULT_API_BASE || '');
    }

    function buildDebugUrl_() {
      const base = getApiBase_();
      if (!base) return '-';
      const url = new URL(base);
      url.searchParams.set('api', 'sessions');
      url.searchParams.set('callback', 'debug');
      return url.toString();
    }

    function normalizeBaseUrl_(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      try {
        const u = new URL(raw);
        return `${u.origin}${u.pathname}`;
      } catch (_) {
        return '';
      }
    }

    function getOrCreateDeviceId_() {
      let id = localStorage.getItem(LS_DEVICE);
      if (id) return id;
      id = `ext-${Math.random().toString(36).slice(2, 11)}-${Date.now().toString(36)}`;
      localStorage.setItem(LS_DEVICE, id);
      return id;
    }

    function eventTypeLabel_(eventType) {
      if (eventType === 'out') return '退場';
      if (eventType === 'in') return '入場';
      return '打刻';
    }

    function toDateTimeInputValue_(date) {
      const d = new Date(date);
      if (isNaN(d.getTime())) return '';
      return [
        d.getFullYear(),
        pad2_(d.getMonth() + 1),
        pad2_(d.getDate()),
      ].join('-') + `T${pad2_(d.getHours())}:${pad2_(d.getMinutes())}`;
    }

    function formatDateTime_(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (isNaN(d.getTime())) return String(value);
      return `${d.getFullYear()}/${pad2_(d.getMonth() + 1)}/${pad2_(d.getDate())} ${pad2_(d.getHours())}:${pad2_(d.getMinutes())}`;
    }

    function pad2_(value) {
      return String(value).padStart(2, '0');
    }

    function escapeHtml_(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
  </script>
